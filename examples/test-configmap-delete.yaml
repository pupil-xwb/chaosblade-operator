apiVersion: chaosblade.io/v1alpha1
kind: ChaosBlade
metadata:
  name: test-configmap-delete
spec:
  experiments:
  - scope: pod
    target: pod
    action: configmapdelete
    desc: "Delete ConfigMap to simulate Pod startup failure"
    matchers:
    - name: names
      value:
      - "my-pod-name"
    - name: namespace
      value:
      - "default"
    # 可选：指定要删除的 ConfigMap 名称，不指定则自动选择 Pod 依赖的第一个非 optional ConfigMap
    # - name: configmap-name
    #   value:
    #   - "my-config"
