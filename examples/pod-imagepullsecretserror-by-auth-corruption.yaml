apiVersion: chaosblade.io/v1alpha1
kind: ChaosBlade
metadata:
  name: pod-imagepullsecretserror-by-auth-corruption
spec:
  experiments:
  - scope: pod
    target: pod
    action: imagepullsecretserror
    desc: "Simulate image pull authentication failure by corrupting imagePullSecrets"
    matchers:
    - name: names
      value:
      - "my-app-pod"
    - name: namespace
      value:
      - "default"
    # Optional: only corrupt a specific imagePullSecret (by default all are corrupted)
    # - name: secret-name
    #   value:
    #   - "my-registry-secret"
