# Inject scheduling failure by adding unreachable taint to nodes.
# This will cause new Pods without matching tolerations to remain in Pending state.
#
# Prerequisites:
# - The operator should have RBAC permissions to get/update nodes

apiVersion: chaosblade.io/v1alpha1
kind: ChaosBlade
metadata:
  name: pod-taint-node
spec:
  experiments:
  - scope: pod
    target: pod
    action: taintnode
    desc: "Inject scheduling failure by adding unreachable taint to nodes"
    matchers:
    - name: nodes
      value:
      - "node1"
    # Optional: taint effect, default is NoSchedule
    # Supported values: NoSchedule, NoExecute, PreferNoSchedule
    # WARNING: NoExecute will evict running pods without matching tolerations
    # - name: taint-effect
    #   value:
    #   - "NoSchedule"
    # Optional: custom taint key and value
    # - name: taint-key
    #   value:
    #   - "chaosblade.io/unreachable"
    # - name: taint-value
    #   value:
    #   - "true"
