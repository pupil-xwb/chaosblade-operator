apiVersion: chaosblade.io/v1alpha1
kind: ChaosBlade
metadata:
  name: test-configmap-delete-without-name
spec:
  experiments:
  - scope: pod
    target: pod
    action: configmapdelete
    desc: "Delete auto-selected ConfigMap to simulate Pod startup failure"
    matchers:
    - name: names
      value:
      - "kone-app-service-69866bbc7d-4hwz6"
    - name: namespace
      value:
      - "ark-system"
