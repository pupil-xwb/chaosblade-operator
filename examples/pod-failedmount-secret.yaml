# Mount a non-existent Secret volume to a deployment's init containers
# to simulate volume mount failure at init stage.
# This will cause Pods to be stuck because the init container cannot start
# due to the missing Secret volume.
#
# Equivalent to:
#   blade create k8s pod-pod failedmount --namespace default \
#     --workload-type deployment --workload-name nginx-app \
#     --volume-type secret --with-initcontainer true --kubeconfig ~/.kube/config
#
# Prerequisites:
# - A deployment named "nginx-app" with init containers should exist in the target namespace
# - The operator should have RBAC permissions to get/update deployments

apiVersion: chaosblade.io/v1alpha1
kind: ChaosBlade
metadata:
  name: pod-failedmount-secret
spec:
  experiments:
  - scope: pod
    target: pod
    action: failedmount
    desc: "mount a non-existent secret volume to deployment init containers"
    matchers:
    - name: namespace
      value:
      - "default"
    - name: workload-type
      value:
      - "deployment"
    - name: workload-name
      value:
      - "nginx-app"
    - name: volume-type
      value:
      - "secret"
    - name: with-initcontainer
      value:
      - "true"
